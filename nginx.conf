server {
    listen 80;
    server_name jmmasalaexports.com www.jmmasalaexports.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name jmmasalaexports.com www.jmmasalaexports.com;

    root /usr/share/nginx/html;
    index index.html;

    # Replace with actual certificate files on server.
    ssl_certificate /etc/letsencrypt/live/jmmasalaexports.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jmmasalaexports.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }
}
